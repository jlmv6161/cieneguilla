var STOREKEY='cieneguilla_auth';
async function descifrar(u,p){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey('raw',enc.encode(u.trim().toLowerCase()+':'+p),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:150000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:IV},key,CT);
  var text=new TextDecoder().decode(pt);
  if(text.indexOf('<!--OK-->')!==0) throw new Error('bad');
  return text.slice(9);
}
async function entrar(){
  var u=document.getElementById('u').value, p=document.getElementById('p').value;
  var btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Verificando...';
  try{
    var html=await descifrar(u,p);
    var store=document.getElementById('rec').checked?localStorage:sessionStorage;
    try{store.setItem(STOREKEY,JSON.stringify({u:u,p:p}));}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    btn.disabled=false; btn.textContent='Entrar';
  }
}
document.getElementById('p').addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
document.getElementById('u').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('p').focus();});
(async function(){
  var saved=null;
  try{saved=JSON.parse(sessionStorage.getItem(STOREKEY)||localStorage.getItem(STOREKEY));}catch(e){}
  if(saved&&saved.u!=null){
    try{var html=await descifrar(saved.u,saved.p);document.open();document.write(html);document.close();}
    catch(e){try{sessionStorage.removeItem(STOREKEY);localStorage.removeItem(STOREKEY);}catch(_){}}
  }
})();
</script>
